<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="container">
        <center><h4>Voter's Verification</h4></center>
        
        <hr>
        
        <label for="age">Enter Age:</label>
            <input type="number" min="1" value="1" id="age">
        <p id="status">Status:</p>
        
        <br>

        <button type="button" class="btn btn-primary" onclick="checkAge()">
            Verify
        </button>

        <button type="button" class="btn btn-success" onclick="window.location.reload()">
            Refresh
        </button>
    </div>

    <div class="container">
        <center><h4>Verify Grade</h4></center>
        
        <hr>
        
        <label for="grade">Enter Average:</label>
            <input type="number" min="1" id="avg">
        
        <br><br><br>

        <button type="button" class="btn btn-primary" onclick="checkAvg()">
            Verify
        </button>

        <button type="button" class="btn btn-success" onclick="window.location.reload()">
            Refresh
        </button>
    </div>

    <script src=main.js></script>
</body>

</html>
